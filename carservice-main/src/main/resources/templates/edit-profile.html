<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — CarServ</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Minimal top bar */
        .top-bar {
            height: 60px;
            background: rgba(10,15,46,0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 14px;
        }
        .top-bar .brand {
            font-size: 1.05rem;
            font-weight: 800;
            text-decoration: none;
            background: linear-gradient(90deg, #7986cb, #e91e8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-bar .back-lnk {
            margin-left: auto;
        }

        /* Main layout */
        .profile-layout {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .profile-card {
            width: 100%;
            max-width: 500px;
            background: rgba(10,15,46,0.82);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 44px 42px;
            backdrop-filter: blur(30px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 50px rgba(61,90,254,0.07);
            position: relative;
        }

        /* Avatar */
        .avatar-ring {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3d5afe, #e91e8c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 6px 24px rgba(233,30,140,0.4);
        }

        .card-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }
        .card-subtitle {
            text-align: center;
            font-size: 13.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 34px;
        }

        .save-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .save-row .btn-primary { flex: 1; }
        .save-row .btn-ghost   { flex: 0 0 auto; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <a href="/dashboard" class="brand">🚗 CarServ</a>
    <a class="btn-ghost back-lnk" onclick="goBack()" style="cursor:pointer;">← Back</a>
</div>

<div class="profile-layout">
    <div class="profile-card">
        <div class="avatar-ring" id="avatarInitial">U</div>
        <h1 class="card-title">Edit Profile</h1>
        <p class="card-subtitle">Update your personal details below</p>

        <div class="cs-form-group">
            <label>Full Name</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input class="cs-input" type="text" id="name" placeholder="Your full name">
            </div>
        </div>

        <div class="cs-form-group">
            <label>Email Address</label>
            <div class="input-wrap">
                <span class="input-icon">✉️</span>
                <input class="cs-input" type="email" id="email" placeholder="Your email">
            </div>
        </div>

        <div class="cs-form-group">
            <label>Phone Number</label>
            <div class="input-wrap">
                <span class="input-icon">📱</span>
                <input class="cs-input" type="text" id="phone" placeholder="Your phone number">
            </div>
        </div>

        <div class="cs-form-group">
            <label>New Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input class="cs-input" type="password" id="password" placeholder="Leave blank to keep current password">
            </div>
            <p class="cs-note">Only fill this if you want to change your password</p>
        </div>

        <div class="save-row">
            <button class="btn-primary" id="save-btn" onclick="saveProfile()">Save Changes</button>
            <button class="btn-ghost" onclick="goBack()">Cancel</button>
        </div>

        <div class="cs-msg" id="msg"></div>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('loggedUser'));
    if (!user) window.location.href = '/';

    // Pre-fill from localStorage immediately
    document.getElementById('avatarInitial').textContent = user.name ? user.name.charAt(0).toUpperCase() : 'U';
    document.getElementById('name').value  = user.name  || '';
    document.getElementById('email').value = user.email || '';

    async function loadFreshProfile() {
        try {
            const res = await fetch(`/api/users/${user.id}`);
            if (!res.ok) return;
            const fresh = await res.json();
            document.getElementById('name').value  = fresh.name  || '';
            document.getElementById('email').value = fresh.email || '';
            document.getElementById('phone').value = fresh.phone || '';
            document.getElementById('avatarInitial').textContent = fresh.name ? fresh.name.charAt(0).toUpperCase() : 'U';
            const merged = Object.assign({}, user, { name: fresh.name, email: fresh.email, phone: fresh.phone });
            localStorage.setItem('loggedUser', JSON.stringify(merged));
        } catch (e) {
            document.getElementById('phone').value = user.phone || '';
        }
    }
    loadFreshProfile();

    function setMsg(text, type) {
        const msg = document.getElementById('msg');
        msg.textContent = text;
        msg.className = 'cs-msg show ' + type;
    }

    function setLoading(loading) {
        const btn = document.getElementById('save-btn');
        btn.disabled = loading;
        btn.innerHTML = loading ? '<span class="spinner"></span> Saving…' : 'Save Changes';
    }

    async function saveProfile() {
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        if (!name || !email) {
            setMsg('⚠️ Name and email are required!', 'error');
            return;
        }

        setLoading(true);
        try {
            const res = await fetch(`/api/users/${user.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phone, password })
            });
            if (res.ok) {
                const updatedUser = await res.json();
                const merged = Object.assign({}, user, { name: updatedUser.name, email: updatedUser.email, phone: updatedUser.phone });
                localStorage.setItem('loggedUser', JSON.stringify(merged));
                setMsg('✅ Profile updated successfully!', 'success');
                setTimeout(() => window.location.href = getDashboardUrl(), 1500);
            } else {
                setMsg('❌ Update failed. Please try again.', 'error');
            }
        } catch (e) {
            setMsg('⚠️ Connection error.', 'error');
        } finally {
            setLoading(false);
        }
    }

    function getDashboardUrl() {
        return (user.role === 'ADMIN' || user.role === 'SUPER_ADMIN') ? '/admin-dashboard' : '/dashboard';
    }
    function goBack() { window.location.href = getDashboardUrl(); }
</script>
</body>
</html>
